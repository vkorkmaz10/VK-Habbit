[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# /api/* istekleri Netlify Functions'a yönlendir (frontend kodu değişmez)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — tüm bilinmeyen rotalar index.html'e
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
